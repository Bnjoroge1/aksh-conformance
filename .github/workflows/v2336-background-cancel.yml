name: v2336 background cancel
on: workflow_dispatch
# trigger-rescan: 1784645538

# Tests that continue-on-error steps (analog for canceled background steps)
# do not affect job conclusion. Verifies #4482 behavior.

jobs:
  bg-cancel:
    runs-on: [self-hosted, overnight]
    steps:
      - name: Normal step
        run: echo "AKSH_ORACLE: normal-step=ok"

      - name: Soft cancel step
        continue-on-error: true
        run: |
          echo "AKSH_ORACLE: about-to-fail"
          exit 1

      - name: After cancel
        run: echo "AKSH_ORACLE: after-cancel=ran"

      - name: Job conclusion check
        run: echo "AKSH_ORACLE: job-conclusion=success"

