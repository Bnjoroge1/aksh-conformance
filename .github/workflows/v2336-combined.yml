name: v2336 combined
on: workflow_dispatch

# Tests v2.336.0 features exercisable on self-hosted runner:
# - GITHUB_ARTIFACTS / GITHUB_ARTIFACTS_LIST file commands
# - GITHUB_ENV / GITHUB_OUTPUT / GITHUB_PATH (regression)
# - continue-on-error (background cancel analog)
# - Step summary

jobs:
  combined:
    runs-on: [self-hosted, overnight]
    steps:
      # 1. File command env vars present
      - name: Verify file command env vars
        shell: bash
        run: |
          set -euo pipefail
          for var in GITHUB_ENV GITHUB_OUTPUT GITHUB_PATH GITHUB_STATE GITHUB_STEP_SUMMARY; do
            val=$(eval echo "\$$var")
            echo "AKSH_ORACLE: $var=$val"
            test -n "$val"
          done
          # GITHUB_ARTIFACTS may or may not be set depending on feature flag
          echo "AKSH_ORACLE: GITHUB_ARTIFACTS=${GITHUB_ARTIFACTS:-unset}"
          echo "AKSH_ORACLE: GITHUB_ARTIFACTS_LIST=${GITHUB_ARTIFACTS_LIST:-unset}"

      # 2. Cross-step env propagation
      - name: Set env
        run: echo "V2336_COMBINED=combined-ok" >> "$GITHUB_ENV"

      - name: Check env
        run: |
          echo "AKSH_ORACLE: V2336_COMBINED=$V2336_COMBINED"
          test "$V2336_COMBINED" = "combined-ok"

      # 3. Output propagation
      - name: Set output
        id: producer
        run: echo "result=42" >> "$GITHUB_OUTPUT"

      - name: Read output
        run: |
          echo "AKSH_ORACLE: producer.result=${{ steps.producer.outputs.result }}"
          test "${{ steps.producer.outputs.result }}" = "42"

      # 4. continue-on-error (background step cancel analog)
      - name: Failing step with continue-on-error
        continue-on-error: true
        run: exit 1

      - name: After soft failure
        run: echo "AKSH_ORACLE: after-soft-fail=ran"

      # 5. PATH additions
      - name: Add to PATH
        run: echo "/tmp/v2336-test-bin" >> "$GITHUB_PATH"

      - name: Verify PATH
        shell: bash
        run: |
          echo "$PATH" | grep -q "v2336-test-bin"
          echo "AKSH_ORACLE: path-addition=ok"

      # 6. Step summary
      - name: Write step summary
        run: |
          echo "### v2.336.0 Combined Test" >> "$GITHUB_STEP_SUMMARY"
          echo "All checks passed." >> "$GITHUB_STEP_SUMMARY"
          echo "AKSH_ORACLE: summary=written"

      # 7. ACTIONS_CACHE_MODE (may or may not be set)
      - name: Check cache mode
        run: echo "AKSH_ORACLE: ACTIONS_CACHE_MODE=${ACTIONS_CACHE_MODE:-unset}"

      # 8. Final
      - name: All v2336 checks passed
        run: echo "AKSH_ORACLE: all-checks=passed"

